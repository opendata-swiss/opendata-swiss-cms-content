name: Trigger preview

on:
  pull_request:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Set pending status
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          context: Preview deployed
          status: pending

      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ODS_GITHUB_APP_ID }}
          private-key: ${{ secrets.ODS_GITHUB_PRIVATE_KEY }}
          owner: opendata-swiss

      - name: Prepare deployment name
        id: vars
        run: |
          BRANCH_STANDARDIZED="$(perl -MURI::Escape -e 'print uri_escape($ARGV[0])' "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//' | cut -c1-40)"
          echo "deployment_name=${BRANCH_STANDARDIZED}" >> $GITHUB_OUTPUT

      - name: Trigger preview
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: previews-ods-ui.yaml
          repo: opendata-swiss/metadata.swiss
          token: ${{ steps.generate_token.outputs.token }}
          ref: cms-submodule
          inputs: '{ "deployment_name": "${{ steps.vars.outputs.deployment_name }}" }'

      - name: Final status check
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          context: Preview deployed
          description: It may take a few minutes for the DNS to propagate, the certificate to be generated and the preview to be reachable.
          status: success
          targetUrl: https://${{ steps.vars.outputs.deployment_name }}.piveau-ln-preview.zazukoians.org/
